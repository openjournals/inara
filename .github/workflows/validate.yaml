name: JATS validation

on:
  push:
    paths:
      - 'test/expected-paper.jats/paper.jats'
  pull_request:
    paths:
      - 'test/expected-paper.jats/paper.jats'

jobs:
  build:
    name: Verify expected JATS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install XML validator
        run: |
          sudo apt install libxml2-utils

      - name: Test image
        run: |
          make validate-jats
